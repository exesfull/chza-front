name: Deploy Vite App via SSH

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Позволяет запустить деплой вручную

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout кода
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Установка Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Установка зависимостей и сборка
      - name: Install dependencies
        run: npm ci

      - name: Build Vite project
        run: npm run build

      # 4. Подготовка index.html для отдельного деплоя в корень /chza/
      - name: Prepare index.html for deploy
        run: mkdir -p deploy-root && cp dist/index.html deploy-root/

      # 5. Деплой статики (assets, vite.svg и т.д.) в /chza/web/
      - name: Deploy static assets to /chza/web/
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: '22'
          SOURCE: 'dist/'
          TARGET: '/var/www/exesfull.com/chza/web/'
          ARGS: '-rlgoDzvc -i --exclude=index.html --delete-before'

      # 6. Деплой только index.html в корень /chza/
      - name: Deploy index.html to /chza/
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: '22'
          SOURCE: 'deploy-root/'
          TARGET: '/var/www/exesfull.com/chza/'
          ARGS: '-rlgoDzvc -i'